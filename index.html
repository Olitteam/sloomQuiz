<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>SLOOM AI 맞춤 추천</title>
    <link rel="stylesheet" href="./style.css">
  </head>

  <body>
    <main class="wrap">
      <!-- 상단 소개 -->
      <header class="hero">
        <span class="tag">SLOOM AI CARE FINDER</span>

        <h1>
          나에게 꼭 맞는<br />
          마사지 기기를 찾아드릴게요
        </h1>

        <p>
          몇 가지 답변을 바탕으로 생활 패턴과 사용 목적을 분석해
          가장 적합한 제품을 추천해드려요.
        </p>
      </header>

      <!-- 초기 데이터 로딩 -->
      <section id="load" class="loading on">
        <div class="spin"></div>
        <p>추천 데이터를 불러오는 중...</p>
      </section>

      <!-- 설문 영역 -->
      <section id="quiz" style="display: none">
        <div class="progress">
          <div class="track">
            <div id="fill" class="fill"></div>
          </div>

          <span id="count" class="count"></span>
        </div>

        <div id="step"></div>

        <div class="nav">
          <button id="prev" class="btn" type="button">← 이전</button>
          <button id="next" class="btn primary" type="button" disabled>
            다음 →
          </button>
        </div>
      </section>

      <!-- 추천 결과 영역 -->
      <section id="result" class="result"></section>
    </main>
    <script src="./style.js"></script>
  </body>
</html>
