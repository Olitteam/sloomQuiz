<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>SLOOM AI 맞춤 추천</title>

    <style>
      /* =========================================================
         1. 기본 색상 및 공통 설정
         ========================================================= */
      :root {
        --bg: #f7f5f2;
        --card: #ffffff;
        --line: #e7e2dc;

        --text: #191714;
        --sub: #6c655f;
        --muted: #9b938b;

        --accent: #315d8a;
        --accent-bg: #edf3f9;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          Pretendard,
          -apple-system,
          BlinkMacSystemFont,
          "Apple SD Gothic Neo",
          sans-serif;
      }

      button,
      a {
        font-family: inherit;
      }

      /* =========================================================
         2. 전체 레이아웃 및 상단 소개
         ========================================================= */
      .wrap {
        width: 100%;
        max-width: 620px;
        margin: 0 auto;
        padding: 42px 18px 70px;
      }

      .tag {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 6px;
        background: var(--accent-bg);
        color: var(--accent);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
      }

      .hero h1 {
        margin: 14px 0 8px;
        font-size: 28px;
        line-height: 1.35;
      }

      .hero p {
        margin: 0;
        color: var(--sub);
        font-size: 14px;
        line-height: 1.7;
      }

      /* =========================================================
         3. 설문 진행률
         ========================================================= */
      .progress {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 30px 0 22px;
      }

      .track {
        flex: 1;
        height: 4px;
        overflow: hidden;
        border-radius: 5px;
        background: var(--line);
      }

      .fill {
        height: 100%;
        background: var(--accent);
        transition: width 0.3s ease;
      }

      .count {
        color: var(--muted);
        font-size: 12px;
      }

      /* =========================================================
         4. 질문 및 선택지
         ========================================================= */
      .qey {
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.1em;
      }

      .qtext {
        margin: 8px 0 18px;
        font-size: 20px;
        font-weight: 700;
        line-height: 1.5;
      }

      .opts {
        display: grid;
        gap: 9px;
      }

      .opt {
        display: flex;
        align-items: center;
        gap: 13px;
        padding: 15px 16px;
        border: 1px solid var(--line);
        border-radius: 13px;
        background: var(--card);
        cursor: pointer;
        transition:
          border-color 0.15s ease,
          background 0.15s ease,
          transform 0.1s ease;
      }

      .opt:hover {
        border-color: #cfc7bf;
      }

      .opt:active {
        transform: scale(0.99);
      }

      .opt.sel {
        border-color: var(--accent);
        background: var(--accent-bg);
      }

      .ico {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 38px;
        height: 38px;
        flex-shrink: 0;
        border-radius: 9px;
        background: #f4f1ed;
      }

      /* =========================================================
         5. 설문 이동 버튼
         ========================================================= */
      .nav {
        display: flex;
        justify-content: space-between;
        margin-top: 22px;
      }

      .btn {
        height: 44px;
        padding: 0 22px;
        border: 1px solid #d4cec7;
        border-radius: 9px;
        background: #ffffff;
        font-weight: 600;
        cursor: pointer;
      }

      .btn.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #ffffff;
      }

      .btn:disabled {
        opacity: 0.35;
        cursor: default;
      }

      /* =========================================================
         6. 로딩 화면
         ========================================================= */
      .loading,
      .result {
        display: none;
      }

      .loading.on {
        display: flex;
        align-items: center;
        flex-direction: column;
        padding: 80px 10px;
      }

      .spin {
        width: 36px;
        height: 36px;
        border: 3px solid var(--line);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* =========================================================
         7. 추천 결과
         ========================================================= */
      .result.on {
        display: block;
      }

      .rating {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 20px 0 10px;
      }

      .rating-stars {
        position: relative;
        display: inline-block;
        font-size: 27px;
        line-height: 1;
        letter-spacing: 3px;
      }

      .rating-stars-base {
        color: #d8d2cb;
      }

      .rating-stars-fill {
        position: absolute;
        top: 0;
        left: 0;
        overflow: hidden;
        color: #f2b84b;
        white-space: nowrap;
      }

      .rating-info {
        display: flex;
        align-items: baseline;
        gap: 5px;
      }

      .rating-info strong {
        color: var(--text);
        font-size: 22px;
      }

      .rating-info span {
        color: var(--muted);
        font-size: 13px;
      }

      .analysis {
        margin: 18px 0;
        padding: 18px;
        border-radius: 14px;
        background: var(--accent-bg);
      }

      .analysis h3 {
        margin: 0 0 8px;
        color: var(--accent);
        font-size: 14px;
      }

      .analysis p {
        margin: 4px 0;
        color: #38516a;
        font-size: 14px;
        line-height: 1.7;
      }

      .card {
        padding: 24px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: #ffffff;
      }

      .card img {
        width: 100%;
        margin: 4px 0 18px;
        border-radius: 12px;
      }

      .badge {
        display: inline-block;
        padding: 5px 9px;
        border-radius: 5px;
        background: var(--accent-bg);
        color: var(--accent);
        font-size: 11px;
        font-weight: 700;
      }

      .name {
        margin: 12px 0 8px;
        font-size: 23px;
        font-weight: 800;
      }

      .summary {
        color: var(--sub);
        font-size: 14px;
        line-height: 1.8;
      }

      .sect {
        margin-top: 24px;
      }

      .sect h3 {
        margin: 0 0 10px;
        font-size: 15px;
      }

      .why {
        margin: 0;
        padding-left: 20px;
        color: var(--sub);
        font-size: 14px;
        line-height: 1.75;
      }

      .tip {
        padding: 15px;
        border-radius: 12px;
        background: #f8f6f3;
        color: var(--sub);
        font-size: 14px;
        line-height: 1.7;
      }

      .buy {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 48px;
        margin-top: 22px;
        border-radius: 10px;
        background: var(--accent);
        color: #ffffff;
        font-weight: 700;
        text-decoration: none;
      }

      /* =========================================================
         8. 대체 추천 및 다시 시작
         ========================================================= */
      .alts {
        margin-top: 18px;
      }

      .alt {
        display: block;
        margin-top: 8px;
        padding: 15px;
        border: 1px solid var(--line);
        border-radius: 11px;
        background: #ffffff;
        color: var(--text);
        text-decoration: none;
      }

      .restart {
        width: 100%;
        height: 44px;
        margin-top: 22px;
        border: 1px solid #d4cec7;
        border-radius: 9px;
        background: transparent;
        color: var(--sub);
        cursor: pointer;
      }

      /* =========================================================
         9. 모바일 대응
         ========================================================= */
      @media (max-width: 480px) {
        .wrap {
          padding-top: 28px;
        }

        .hero h1 {
          font-size: 24px;
        }

        .qtext {
          font-size: 18px;
        }
      }
    </style>
  </head>

  <body>
    <main class="wrap">
      <!-- 상단 소개 -->
      <header class="hero">
        <span class="tag">SLOOM AI CARE FINDER</span>

        <h1>
          나에게 꼭 맞는<br />
          마사지 기기를 찾아드릴게요
        </h1>

        <p>
          몇 가지 답변을 바탕으로 생활 패턴과 사용 목적을 분석해
          가장 적합한 제품을 추천해드려요.
        </p>
      </header>

      <!-- 초기 데이터 로딩 -->
      <section id="load" class="loading on">
        <div class="spin"></div>
        <p>추천 데이터를 불러오는 중...</p>
      </section>

      <!-- 설문 영역 -->
      <section id="quiz" style="display: none">
        <div class="progress">
          <div class="track">
            <div id="fill" class="fill"></div>
          </div>

          <span id="count" class="count"></span>
        </div>

        <div id="step"></div>

        <div class="nav">
          <button id="prev" class="btn" type="button">← 이전</button>
          <button id="next" class="btn primary" type="button" disabled>
            다음 →
          </button>
        </div>
      </section>

      <!-- 추천 결과 영역 -->
      <section id="result" class="result"></section>
    </main>

    <script>
      /* =========================================================
         1. 관리자 설정 및 상태값
         ========================================================= */
      const SHEET_ID = "1-77nO97ax3J2Ca-ykU7zzTVHWqm8w35cGsCvmHM24_A";

      /* =========================================================
         GA4 / GTM 추적 설정

         - 사이트에 GA4 또는 GTM이 이미 설치되어 있으면 그대로 사용됩니다.
         - 별도 설치가 필요하면 아래 GA_MEASUREMENT_ID에 G-로 시작하는
           측정 ID를 입력하세요. 비워두면 기존 dataLayer만 사용합니다.
         ========================================================= */
      const TRACKING = {
        // 선택 사항: GA4 측정 ID. 사용하지 않으면 빈 값으로 두세요.
        GA_MEASUREMENT_ID: "",

        // 필수: Apps Script를 웹앱으로 배포한 뒤 생성되는 /exec URL을 입력하세요.
        // 예: https://script.google.com/macros/s/XXXXXXXXXXXX/exec
        SHEET_LOG_ENDPOINT: "https://script.google.com/macros/s/AKfycbyVLmYdM_RYEHyRm8Ht5ALdn7iIkzQ5cjI1rN0aBUzuGsyk4imYXyh903Tu7Xsqa4WZ/exec",

        DEBUG: false,
      };

      window.dataLayer = window.dataLayer || [];

      function gtag() {
        window.dataLayer.push(arguments);
      }

      if (TRACKING.GA_MEASUREMENT_ID) {
        const gaScript = document.createElement("script");
        gaScript.async = true;
        gaScript.src =
          `https://www.googletagmanager.com/gtag/js?id=${TRACKING.GA_MEASUREMENT_ID}`;
        document.head.appendChild(gaScript);

        gtag("js", new Date());
        gtag("config", TRACKING.GA_MEASUREMENT_ID);
      }

      const recommendationSessionId = (() => {
        const storageKey = "sloom_recommend_session_id";
        let sessionId = sessionStorage.getItem(storageKey);

        if (!sessionId) {
          sessionId =
            typeof crypto !== "undefined" && crypto.randomUUID
              ? crypto.randomUUID()
              : `rec_${Date.now()}_${Math.random().toString(36).slice(2, 10)}`;
          sessionStorage.setItem(storageKey, sessionId);
        }

        return sessionId;
      })();

      let recommendationStarted = false;
      let currentRecommendedProduct = "";
      let currentRecommendationRating = 0;

      function sendEventToGoogleSheet(eventName, payload) {
        if (!TRACKING.SHEET_LOG_ENDPOINT) {
          if (TRACKING.DEBUG) {
            console.warn(
              "[SLOOM Tracking] SHEET_LOG_ENDPOINT가 비어 있어 시트 기록을 건너뜁니다.",
            );
          }
          return;
        }

        const logData = {
          event_name: eventName,
          session_id: recommendationSessionId,
          user_id: "",
          event_time: new Date().toISOString(),
          page_url: window.location.href,
          source: new URLSearchParams(window.location.search).get("utm_source") || "",
          medium: new URLSearchParams(window.location.search).get("utm_medium") || "",
          campaign: new URLSearchParams(window.location.search).get("utm_campaign") || "",
          body: answers.body || "",
          lifestyle: answers.lifestyle || "",
          when: answers.when || "",
          priority: answers.priority || "",
          ...payload,
        };

        // Apps Script 웹앱은 응답을 읽지 않는 no-cors 방식으로 전송합니다.
        // 페이지 이동 직전 클릭도 누락되지 않도록 sendBeacon을 우선 사용합니다.
        const body = JSON.stringify(logData);

        if (navigator.sendBeacon) {
          const blob = new Blob([body], { type: "text/plain;charset=UTF-8" });
          const sent = navigator.sendBeacon(TRACKING.SHEET_LOG_ENDPOINT, blob);
          if (sent) return;
        }

        fetch(TRACKING.SHEET_LOG_ENDPOINT, {
          method: "POST",
          mode: "no-cors",
          keepalive: true,
          headers: { "Content-Type": "text/plain;charset=UTF-8" },
          body,
        }).catch((error) => {
          if (TRACKING.DEBUG) {
            console.error("[SLOOM Tracking] 시트 기록 실패", error);
          }
        });
      }

      function trackEvent(eventName, parameters = {}) {
        const payload = {
          recommendation_session_id: recommendationSessionId,
          ...parameters,
        };

        // 구글 스프레드시트 Event_Log에 실제 사용자 행동을 기록합니다.
        sendEventToGoogleSheet(eventName, parameters);

        // GA4가 설치되어 있다면 이벤트로도 전송됩니다.
        gtag("event", eventName, payload);

        // GTM에서는 event 키를 기준으로 맞춤 이벤트 트리거를 만들 수 있습니다.
        window.dataLayer.push({
          event: eventName,
          ...payload,
        });

        if (TRACKING.DEBUG) {
          console.log(`[SLOOM Tracking] ${eventName}`, payload);
        }
      }

      const CONFIG = {
        questions: [],
        products: {},
        rules: [],
        results: {},
        templates: {},
      };

      let currentStep = 0;
      let answers = {};

      const $ = (selector) => document.querySelector(selector);

      const escapeHtml = (value) =>
        String(value ?? "").replace(
          /[&<>"]/g,
          (character) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
            })[character],
        );

      /* =========================================================
         2. 구글 시트 데이터 불러오기
         ========================================================= */
      function getSheetUrl(sheetName) {
        return (
          `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq` +
          `?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`
        );
      }

      async function fetchSheet(sheetName) {
        const response = await fetch(getSheetUrl(sheetName));
        const text = await response.text();

        const matchedResponse = text.match(
          /setResponse\((.+)\);?\s*$/s,
        );

        const json = JSON.parse(
          matchedResponse
            ? matchedResponse[1]
            : text.slice(text.indexOf("{")),
        );

        const table = json.table || {};
        const rows = (table.rows || []).filter(
          (row) =>
            row.c &&
            row.c.some((cell) => cell?.v != null),
        );

        if (!rows.length) {
          return [];
        }

        // Google Sheets가 첫 행을 헤더로 자동 인식한 경우에는
        // table.cols의 label을 사용합니다.
        const columnLabels = (table.cols || []).map((column) =>
          String(column?.label ?? "").trim(),
        );

        const hasDetectedHeaders = columnLabels.some(Boolean);

        let headers;
        let dataRows;

        if (hasDetectedHeaders) {
          headers = columnLabels.map((label, index) =>
            label || `column_${index + 1}`,
          );
          dataRows = rows;
        } else {
          // 헤더가 자동 인식되지 않은 경우에만 첫 번째 행을 헤더로 사용합니다.
          headers = rows[0].c.map((cell, index) =>
            String(cell?.v ?? `column_${index + 1}`).trim(),
          );
          dataRows = rows.slice(1);
        }

        return dataRows.map((row) =>
          Object.fromEntries(
            headers.map((header, index) => [
              header,
              row.c[index]?.v ?? "",
            ]),
          ),
        );
      }

      function parseQuestions(rows) {
        return rows.map((row) => {
          const options = [];

          for (
            let optionIndex = 1;
            row[`label${optionIndex}`] !== undefined;
            optionIndex += 1
          ) {
            const label = row[`label${optionIndex}`];

            if (!label) {
              continue;
            }

            options.push({
              icon: row[`icon${optionIndex}`] || "",
              label,
              value: String(row[`value${optionIndex}`]),
            });
          }

          return {
            key: row.key,
            text: row.question,
            options,
          };
        });
      }

      /* =========================================================
         3. 전체 데이터 초기화
         ========================================================= */
      async function initialize() {
        try {
          const [
            questionRows,
            productRows,
            ruleRows,
            resultRows,
            templateRows,
          ] = await Promise.all(
            [
              "questions",
              "products",
              "product_rules",
              "product_result",
              "ai_templates",
            ].map(fetchSheet),
          );

          CONFIG.questions = parseQuestions(questionRows);

          productRows.forEach((product) => {
            CONFIG.products[product.key] = product;
          });

          CONFIG.rules = ruleRows
            .map((rule) => ({
              product: String(rule.product ?? "").trim(),
              type: String(rule.type ?? "").trim(),
              value: String(rule.value ?? "").trim(),
              score: Number(rule.score) || 0,
            }))
            .filter(
              (rule) =>
                rule.product &&
                rule.type &&
                rule.value,
            );

          if (!CONFIG.rules.some((rule) => rule.type === "body")) {
            throw new Error(
              "product_rules 시트에서 body 규칙을 읽지 못했습니다. 헤더가 product / type / value / score인지 확인해주세요.",
            );
          }

          resultRows.forEach((result) => {
            CONFIG.results[result.product] = result;
          });

          templateRows.forEach((template) => {
            CONFIG.templates[template.key] = template.text;
          });

          $("#load").classList.remove("on");
          $("#quiz").style.display = "block";

          // 페이지가 정상적으로 로드될 때마다 조회수 1회를 기록합니다.
          trackEvent("page_view", {
            page_location: window.location.href,
            page_title: document.title,
          });

          // 추천 서비스 진입 이벤트도 별도로 기록합니다.
          trackEvent("recommend_view", {
            page_location: window.location.href,
            page_title: document.title,
          });

          renderQuestion();
        } catch (error) {
          $("#load").innerHTML = `
            <p>
              데이터를 불러오지 못했어요.<br />
              시트 공유 설정과 시트명을 확인해주세요.
            </p>
          `;

          console.error(error);
        }
      }

      /* =========================================================
         4. 질문 화면 렌더링
         ========================================================= */
      function renderQuestion() {
        const question = CONFIG.questions[currentStep];
        const totalQuestions = CONFIG.questions.length;

        $("#fill").style.width =
          `${((currentStep + 1) / totalQuestions) * 100}%`;

        $("#count").textContent =
          `${currentStep + 1} / ${totalQuestions}`;

        $("#step").innerHTML = `
          <div class="qey">
            QUESTION ${currentStep + 1}
          </div>

          <div class="qtext">
            ${escapeHtml(question.text)}
          </div>

          <div class="opts">
            ${question.options
              .map(
                (option) => `
                  <div
                    class="opt ${
                      answers[question.key] === option.value
                        ? "sel"
                        : ""
                    }"
                    data-value="${escapeHtml(option.value)}"
                  >
                    <div class="ico">
                      ${option.icon}
                    </div>

                    <div>
                      ${escapeHtml(option.label)}
                    </div>
                  </div>
                `,
              )
              .join("")}
          </div>
        `;

        document.querySelectorAll(".opt").forEach((element) => {
          element.addEventListener("click", () => {
            answers[question.key] = element.dataset.value;

            if (!recommendationStarted) {
              recommendationStarted = true;
              trackEvent("recommend_start", {
                first_question: question.key,
              });
            }

            trackEvent("recommend_answer", {
              question_key: question.key,
              answer_value: element.dataset.value,
              question_step: currentStep + 1,
            });

            renderQuestion();
          });
        });

        $("#prev").disabled = currentStep === 0;
        $("#next").disabled =
          answers[question.key] === undefined;

        $("#next").textContent =
          currentStep === totalQuestions - 1
            ? "AI 추천 결과 보기 →"
            : "다음 →";
      }

      /* =========================================================
         5. 이전 / 다음 버튼
         ========================================================= */
      $("#prev").addEventListener("click", () => {
        if (currentStep > 0) {
          currentStep -= 1;
          renderQuestion();
        }
      });

      $("#next").addEventListener("click", () => {
        if (currentStep < CONFIG.questions.length - 1) {
          currentStep += 1;
          renderQuestion();
          return;
        }

        analyzeAnswers();
      });

      /* =========================================================
         6. 제품별 점수 계산
         ========================================================= */
      function analyzeAnswers() {
        const candidates = {};

        // 사용자가 선택한 부위와 일치하는 제품만 후보로 등록
        CONFIG.rules
          .filter(
            (rule) =>
              rule.type === "body" &&
              String(rule.value) === answers.body,
          )
          .forEach((rule) => {
            candidates[rule.product] = {
              score: rule.score,
              matches: 1,
              highestMatchedScore: rule.score,
            };
          });

        // 라이프스타일, 사용 시점, 우선 기능 점수 추가
        CONFIG.rules.forEach((rule) => {
          const candidate = candidates[rule.product];

          if (!candidate || rule.type === "body") {
            return;
          }

          if (answers[rule.type] === String(rule.value)) {
            candidate.score += rule.score;
            candidate.matches += 1;
            candidate.highestMatchedScore = Math.max(
              candidate.highestMatchedScore,
              rule.score,
            );
          }
        });

        const ranking = Object.entries(candidates).sort(
          (first, second) =>
            second[1].score - first[1].score ||
            second[1].matches - first[1].matches ||
            second[1].highestMatchedScore -
              first[1].highestMatchedScore,
        );

        if (!ranking.length) {
          showNoResult();
          return;
        }

        const bestProduct = ranking[0];

        const maxPossibleScore =
          100 +
          getHighestRuleScore("lifestyle", answers.lifestyle) +
          getHighestRuleScore("when", answers.when) +
          getHighestRuleScore("priority", answers.priority);

        const fitScore = Math.min(
          99,
          Math.max(
            72,
            Math.round(
              (bestProduct[1].score / maxPossibleScore) * 100,
            ),
          ),
        );

        const rankedAlternativeKeys = ranking
          .slice(1, 3)
          .map(([productKey]) => productKey);

        renderResult(
          bestProduct[0],
          fitScore,
          rankedAlternativeKeys,
        );
      }

      function getHighestRuleScore(type, value) {
        const scores = CONFIG.rules
          .filter(
            (rule) =>
              rule.type === type &&
              String(rule.value) === value,
          )
          .map((rule) => rule.score);

        return scores.length ? Math.max(...scores) : 0;
      }

      /* =========================================================
         7. 결과 화면 렌더링
         ========================================================= */
      function renderResult(
        productKey,
        fitScore,
        rankedAlternativeKeys,
      ) {
        const product = CONFIG.products[productKey];
        const result = CONFIG.results[productKey] || {};

        const alternatives = [
          result.alt1,
          result.alt2,
          ...rankedAlternativeKeys,
        ]
          .filter(
            (key, index, array) =>
              key &&
              key !== productKey &&
              array.indexOf(key) === index,
          )
          .slice(0, 2);

        const analysisTexts = [
          CONFIG.templates[
            `lifestyle_${answers.lifestyle}`
          ],
          CONFIG.templates[`when_${answers.when}`],
          CONFIG.templates[
            `priority_${answers.priority}`
          ],
        ].filter(Boolean);

        // 기존 적합도 점수를 5점 만점 추천 별점으로 환산
        const recommendationRating = Math.min(
          5,
          Math.max(3.5, fitScore / 20),
        );
        const recommendationRatingText =
          recommendationRating.toFixed(1);
        const starFillWidth =
          (recommendationRating / 5) * 100;

        currentRecommendedProduct = productKey;
        currentRecommendationRating = Number(recommendationRatingText);

        trackEvent("recommend_result", {
          recommended_product: productKey,
          recommended_product_name: product.name,
          recommendation_score: fitScore,
          recommendation_rating: currentRecommendationRating,
          body: answers.body || "",
          lifestyle: answers.lifestyle || "",
          when: answers.when || "",
          priority: answers.priority || "",
        });

        $("#quiz").style.display = "none";
        $("#result").classList.add("on");

        $("#result").innerHTML = `
          <div
            class="rating"
            aria-label="추천 별점 ${recommendationRatingText}점"
          >
            <div class="rating-stars" aria-hidden="true">
              <div class="rating-stars-base">★★★★★</div>

              <div
                class="rating-stars-fill"
                style="width: ${starFillWidth}%"
              >
                ★★★★★
              </div>
            </div>

            <div class="rating-info">
              <strong>${recommendationRatingText}</strong>
              <span>/ 5.0 추천 별점</span>
            </div>
          </div>

          <div class="analysis">
            <h3>
              ${escapeHtml(
                CONFIG.templates.analysis_title ||
                  "AI 생활 패턴 분석",
              )}
            </h3>

            ${analysisTexts
              .map(
                (text) => `
                  <p>${escapeHtml(text)}</p>
                `,
              )
              .join("")}
          </div>

          <div class="card">
            <span class="badge">
              🎯
              ${escapeHtml(
                CONFIG.templates.recommend_title ||
                  "가장 잘 맞는 제품",
              )}
            </span>

            <img
              src="${escapeHtml(product.thumb)}"
              alt="${escapeHtml(product.name)}"
            />

            <div class="name">
              ${escapeHtml(product.name)}
            </div>

            <div class="summary">
              <strong>
                ${escapeHtml(
                  result.result_title || "맞춤 추천",
                )}
              </strong>

              <br />

              ${escapeHtml(
                result.summary ||
                  "고객님의 응답과 가장 높은 적합도를 기록한 제품입니다.",
              )}
            </div>

            <div class="sect">
              <h3>
                ${escapeHtml(
                  CONFIG.templates.why_title ||
                    "이런 이유로 추천드려요",
                )}
              </h3>

              <ul class="why">
                ${[result.why1, result.why2, result.why3]
                  .filter(Boolean)
                  .map(
                    (reason) => `
                      <li>${escapeHtml(reason)}</li>
                    `,
                  )
                  .join("")}
              </ul>
            </div>

            <div class="sect">
              <h3>
                ${escapeHtml(
                  CONFIG.templates.tip_title ||
                    "추천 사용 루틴",
                )}
              </h3>

              <div class="tip">
                ${escapeHtml(result.usage_tip)}
              </div>
            </div>

            <a
              class="buy"
              href="${escapeHtml(product.link)}"
              target="_blank"
              rel="noopener"
              onclick="trackProductClick('${escapeHtml(productKey)}', 1, 'main')"
            >
              ${escapeHtml(
                product.link_label || "제품 보러가기",
              )}
              ↗
            </a>
          </div>

          <div class="alts">
            <h3>
              ${escapeHtml(
                CONFIG.templates.alt_title ||
                  "함께 비교해볼 제품",
              )}
            </h3>

            ${alternatives
              .map((alternativeKey, index) =>
                renderAlternativeProduct(
                  alternativeKey,
                  index + 2,
                ),
              )
              .join("")}
          </div>

          <button
            class="restart"
            type="button"
            onclick="restartQuiz()"
          >
            ↺ 처음부터 다시 하기
          </button>
        `;
      }

      function renderAlternativeProduct(productKey, rank) {
        const product = CONFIG.products[productKey];

        if (!product) {
          return "";
        }

        const result = CONFIG.results[productKey] || {};

        return `
          <a
            class="alt"
            href="${escapeHtml(product.link)}"
            target="_blank"
            rel="noopener"
            onclick="trackProductClick('${escapeHtml(productKey)}', ${rank}, 'alternative')"
          >
            <strong>
              ${escapeHtml(product.name)}
            </strong>

            <br />

            <small>
              ${escapeHtml(
                result.result_title ||
                  "다른 조건에 잘 맞는 제품",
              )}
            </small>
          </a>
        `;
      }

      function trackProductClick(productKey, rank, clickType) {
        const product = CONFIG.products[productKey] || {};

        trackEvent(
          clickType === "main"
            ? "recommend_product_click"
            : "recommend_alt_click",
          {
            recommended_product: currentRecommendedProduct,
            clicked_product: productKey,
            clicked_product_name: product.name || "",
            click_rank: rank,
            click_type: clickType,
            recommendation_rating: currentRecommendationRating,
            body: answers.body || "",
            lifestyle: answers.lifestyle || "",
            when: answers.when || "",
            priority: answers.priority || "",
          },
        );
      }

      function showNoResult() {
        $("#quiz").style.display = "none";
        $("#result").classList.add("on");

        $("#result").innerHTML = `
          <div class="card">
            <div class="name">
              추천 결과를 찾지 못했어요.
            </div>

            <div class="summary">
              선택한 부위에 연결된 제품 규칙이 있는지
              product_rules 시트를 확인해주세요.
            </div>

            <button
              class="restart"
              type="button"
              onclick="restartQuiz()"
            >
              ↺ 처음부터 다시 하기
            </button>
          </div>
        `;
      }

      /* =========================================================
         8. 설문 초기화
         ========================================================= */
      function restartQuiz() {
        trackEvent("recommend_restart", {
          recommended_product: currentRecommendedProduct,
          recommendation_rating: currentRecommendationRating,
        });

        currentStep = 0;
        answers = {};
        recommendationStarted = false;
        currentRecommendedProduct = "";
        currentRecommendationRating = 0;

        $("#result").classList.remove("on");
        $("#result").innerHTML = "";
        $("#quiz").style.display = "block";

        renderQuestion();
      }

      /* =========================================================
         9. 실행
         ========================================================= */
      initialize();
    </script>
  </body>
</html>
